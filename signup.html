<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        /* ───────────────────────────────────────
           BASIC PAGE SETUP (Warm Chocolate Theme)
           ─────────────────────────────────────── */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdf2f8 0%, #fff7ed 100%); /* Soft Pink/Cream */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* ───────────────────────────────────────
           ANIMATED BACKGROUND (Treats Rain)
           ─────────────────────────────────────── */
        .treats-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .treat {
            position: absolute;
            top: -10%;
            font-size: 2rem;
            animation: fall linear infinite;
            opacity: 0.8;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* ───────────────────────────────────────
           MUSIC BUTTON STYLES
           ─────────────────────────────────────── */
        .music-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            border: 2px solid #4b2c20; /* Dark Chocolate Border */
            color: #4b2c20;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(75, 44, 32, 0.2);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: #4b2c20;
            color: #fff;
            transform: scale(1.05);
        }

        .music-btn.playing {
            background: #d97706; /* Chocolate Orange */
            color: white;
            border-color: #b45309;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(217, 119, 6, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 119, 6, 0); }
        }

        /* ───────────────────────────────────────
           SIGNUP FORM STYLING
           ─────────────────────────────────────── */
        .form-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 350px; /* Wider for signup fields */
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #fff;
            z-index: 10;
            position: relative;
        }

        h2 {
            color: #be185d; /* Dark Pink/Red */
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-family: 'Fredoka One', cursive, sans-serif;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: #fff;
            color: #374151;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: #be185d; /* Deep Pink */
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-family: 'Fredoka One', cursive, sans-serif;
        }

        button[type="submit"]:hover {
            background: #9d174d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(190, 24, 93, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        a {
            color: #be185d;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <!-- Music Toggle Button -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
        🎵 Play Music
    </button>

    <!-- Animated Background Container -->
    <div class="treats-container" id="treatsContainer"></div>

    <div class="form-box">
        <h2>📝 Create Account</h2>

        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Signup</button>
        </form>

        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>
        // ───────────────────────────────────────
        // 1. FALLING TREATS BACKGROUND
        // ───────────────────────────────────────
        const treats = [
            '🎂', '🍰', '🧁', '🍩', '🍪', '🍫', 
            '🍬', '🍭', '☕', '🥐', '🥯', '🧇'
        ];

        const container = document.getElementById('treatsContainer');

        function createFallingTreat() {
            const treat = document.createElement('div');
            treat.classList.add('treat');
            
            treat.textContent = treats[Math.floor(Math.random() * treats.length)];
            
            treat.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 1.5 + 1;
            treat.style.fontSize = (2 * size) + 'rem';
            
            const duration = Math.random() * 5 + 5;
            treat.style.animationDuration = duration + 's';
            
            treat.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(treat);

            setTimeout(() => {
                treat.remove();
            }, (duration + 5) * 1000);
        }

        // Create initial batch
        for(let i=0; i<30; i++) {
            createFallingTreat();
        }

        // Continually add new treats
        setInterval(createFallingTreat, 400);


        // ───────────────────────────────────────
        // 2. CHOCOLATE MUSIC SYNTHESIZER
        // ───────────────────────────────────────
        let audioCtx;
        let isPlaying = false;
        let sequencerInterval;
        let noteIndex = 0;

        // A "Chocolate" mood scale (Low, warm, slightly jazzy)
        // Frequencies for A Minor Pentatonic
        const melodyNotes = [
            110.00, // A2 (Deep Bass)
            130.81, // C3
            146.83, // D3
            164.81, // E3
            196.00, // G3
            220.00, // A3
            164.81, // E3
            130.81  // C3
        ];

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playTone(freq, type = 'triangle', duration = 0.4) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // Smooth Envelope
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playBass() {
            // A soft "heartbeat" kick drum
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playMusicLoop() {
            if (!isPlaying) return;

            // Play a note from the melody
            const freq = melodyNotes[noteIndex % melodyNotes.length];
            playTone(freq, 'triangle', 0.5);

            // Play bass every other note
            if (noteIndex % 2 === 0) {
                playBass();
            }

            noteIndex++;
        }

        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            
            if (!isPlaying) {
                // START
                initAudio();
                
                // Resume context if suspended (browser policy)
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                isPlaying = true;
                btn.textContent = "🎵 Stop Music";
                btn.classList.add('playing');
                
                // Play loop every 400ms
                sequencerInterval = setInterval(playMusicLoop, 400);
                
                // Play a tone immediately for feedback
                playTone(220, 'sine', 0.2);

            } else {
                // STOP
                isPlaying = false;
                btn.textContent = "🎵 Play Music";
                btn.classList.remove('playing');
                
                clearInterval(sequencerInterval);
            }
        }
    </script>
</body>
</html>
