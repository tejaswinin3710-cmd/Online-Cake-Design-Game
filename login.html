<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        /* ───────────────────────────────────────
           BASIC PAGE SETUP
           ─────────────────────────────────────── */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdf2f8 0%, #fff7ed 100%); /* Soft pink/cream */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Hide scrollbars for the background effect */
            position: relative;
        }

        /* ───────────────────────────────────────
           ANIMATED BACKGROUND (Treats Rain)
           ─────────────────────────────────────── */
        .treats-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Behind everything */
            pointer-events: none; /* Click through to the form */
            overflow: hidden;
        }

        .treat {
            position: absolute;
            top: -10%; /* Start just above screen */
            font-size: 2rem;
            animation: fall linear infinite;
            opacity: 0.8;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* ───────────────────────────────────────
           LOGIN FORM STYLING
           ─────────────────────────────────────── */
        .form-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #fff;
            z-index: 10; /* Sit on top of background */
            position: relative;
        }

        h2 {
            color: #db2777; /* Pink */
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-family: 'Fredoka One', cursive, sans-serif; /* Fun font */
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: #fff;
            color: #374151;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box; /* Fixes padding width issues */
        }

        input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: #db2777; /* Pink Button */
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-family: 'Fredoka One', cursive, sans-serif;
        }

        button[type="submit"]:hover {
            background: #be185d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(219, 39, 119, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        a {
            color: #db2777;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <!-- Animated Background Container -->
    <div class="treats-container" id="treatsContainer"></div>

    <div class="form-box">
        <h2>🔐 Login</h2>

        <!-- ✅ FIXED FORM -->
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="/signup">Signup</a></p>
    </div>

    <script>
        // List of items to fall in the background
        const treats = [
            '🎂', '🍰', '🧁', '🍩', '🍪', '🍫', 
            '🍬', '🍭', '☕', '🥐', '🥯', '🧇'
        ];

        const container = document.getElementById('treatsContainer');

        function createFallingTreat() {
            const treat = document.createElement('div');
            treat.classList.add('treat');
            
            // Pick a random treat emoji
            treat.textContent = treats[Math.floor(Math.random() * treats.length)];
            
            // Random horizontal position (0% to 100%)
            treat.style.left = Math.random() * 100 + 'vw';
            
            // Random size variation
            const size = Math.random() * 1.5 + 1; // 1x to 2.5x
            treat.style.fontSize = (2 * size) + 'rem';
            
            // Random animation duration (speed of falling)
            const duration = Math.random() * 5 + 5; // 5s to 10s
            treat.style.animationDuration = duration + 's';
            
            // Random animation delay so they don't all fall at once
            treat.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(treat);

            // Remove element after animation finishes to clean up DOM
            setTimeout(() => {
                treat.remove();
            }, (duration + 5) * 1000);
        }

        // Create initial batch
        for(let i=0; i<30; i++) {
            createFallingTreat();
        }

        // Continually add new treats
        setInterval(createFallingTreat, 400);

    </script>
</body>
</html>
